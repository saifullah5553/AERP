# AERP local stack: postgres + redis + api + worker + beat.
# Usage (from repo root):  docker compose -f infra/docker-compose.yml up --build
name: aerp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aerp}
      POSTGRES_DB: ${POSTGRES_DB:-aerp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aerp} -d ${POSTGRES_DB:-aerp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # Inside the compose network, reach services by name.
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "1"
      AERP_PSX_CSV_DIR: /data/psx_csv
    volumes:
      # Mount the PSX CSV folder (put files in ./data/psx_csv or set PSX_CSV_HOST_DIR).
      - ${PSX_CSV_HOST_DIR:-../data/psx_csv}:/data/psx_csv:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      AERP_PSX_CSV_DIR: /data/psx_csv
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - ${PSX_CSV_HOST_DIR:-../data/psx_csv}:/data/psx_csv:ro
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "--loglevel=info"]
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Browser talks to the API on the host-published port.
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
