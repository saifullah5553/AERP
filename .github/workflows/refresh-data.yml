name: Refresh Demo Data

# The free "worker/beat": runs the whole pipeline on a schedule (GitHub Actions is
# free for public repos), regenerates the real data snapshot, commits it for the
# record, then builds and deploys the Pages site — all in one run. No server, no
# database, no external account.
#
# (Deploy is done here rather than by triggering Deploy Pages, because pushes made
# with the default GITHUB_TOKEN do not trigger other workflows.)
on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
  push:
    paths: [".github/workflows/refresh-data.yml"] # self-test on changes

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+pysqlite:///./aerp.db
      AERP_PSX_CSV_DIR: ../data/psx_csv
      AERP_PSX_INSIDER_CSV: ../data/psx_insider.csv
      AERP_SEED_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt

      - name: Unpack PSX CSV inputs
        run: |
          mkdir -p data/psx_csv
          tar xzf data/psx_csv.tar.gz -C data

      - name: Run pipeline + export snapshot
        working-directory: backend
        run: |
          python -m app.cli init-db
          python -m app.cli seed
          python -m app.cli ingest-psx || true
          python -m app.cli ingest-macro || true
          python -m app.cli ingest-psx-insider || true
          python -m app.cli ingest-news --limit 40 || true
          python -m app.cli compute || true
          python -m app.cli export-static

      - name: Commit refreshed snapshot (for the record)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh demo data snapshot"
            git push || echo "push skipped"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Pages site
        working-directory: frontend
        run: npm install && npm run build
        env:
          VITE_BASE: /AERP/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
