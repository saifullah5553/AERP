server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: every unknown path serves index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
